<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Management System</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
      input, button, select { font-family: inherit; font-size: 14px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
      button { cursor: pointer; background: #1976d2; color: #fefefe; border: none; padding: 8px 16px; border-radius: 4px; transition: background 0.15s ease-out; }
      button:hover { background: #1565c0; }
      button:focus-visible { outline: 2px solid #1976d2; outline-offset: 2px; }
      button.secondary { background: #fefefe; color: #333; border: 1px solid #ccc; }
      button.secondary:hover { background: #f0f0f0; }
      button.danger { background: #d32f2f; }
      button.danger:hover { background: #b71c1c; }
      button.danger:focus-visible { outline-color: #d32f2f; }
      button.warning { background: #f57c00; }
      button.warning:hover { background: #e65100; }
      button.success { background: #388e3c; }
      button.success:hover { background: #2e7d32; }
      button.nav-ghost { background: transparent; color: #fefefe; border: 1px solid rgba(255,255,255,0.5); padding: 4px 12px; }
      button.nav-ghost:hover { background: rgba(255,255,255,0.12); }
      button.nav-action { background: #fefefe; color: #1976d2; font-weight: 600; padding: 6px 14px; border: none; }
      button.nav-action:hover { background: #e3f2fd; }
      table { border-collapse: collapse; width: 100%; }
      th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e0e0e0; }
      th { background: #fafafa; font-weight: 600; font-size: 13px; color: #555; }
      tbody tr { transition: background 0.1s ease-out; }
      tbody tr:hover { background: #f9f9f9; }
      label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 13px; color: #555; }
      input, select { width: 100%; margin-bottom: 12px; transition: border-color 0.15s ease-out; }
      input:focus, select:focus { outline: none; border-color: #1976d2; }
      .error { color: #d32f2f; font-size: 13px; margin: 4px 0; }
      .page-loading { color: #888; font-size: 14px; padding: 48px 0; text-align: center; }
      .empty-state { text-align: center; padding: 56px 24px; color: #888; }
      .empty-state strong { display: block; font-size: 15px; color: #555; font-weight: 600; margin-bottom: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
